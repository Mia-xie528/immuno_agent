<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>3D 科研知识图谱</title>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three-spritetext@1.9.3/dist/three-spritetext.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/3d-force-graph@1.73.4/dist/3d-force-graph.min.js"></script>

  <style>
    :root {
      color-scheme: dark;
      font-family:
        Inter, "PingFang SC", "Microsoft YaHei", system-ui, -apple-system,
        BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 45%, #101b38 0%, #050914 42%, #010207 100%);
    }

    body {
      position: relative;
    }

    #graph {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #graph canvas {
      display: block;
      outline: none;
    }

    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      z-index: 50;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      color: #bdeeff;
      font-size: 15px;
      letter-spacing: 0.12em;
      text-shadow: 0 0 14px rgba(67, 214, 255, 0.8);
      pointer-events: none;
    }

    .loading-ring {
      width: 48px;
      height: 48px;
      border: 2px solid rgba(76, 224, 255, 0.2);
      border-top-color: #55ecff;
      border-right-color: #a77dff;
      border-radius: 50%;
      animation: loading-spin 1s linear infinite;
      box-shadow:
        0 0 18px rgba(61, 223, 255, 0.55),
        inset 0 0 16px rgba(152, 92, 255, 0.25);
    }

    @keyframes loading-spin {
      to {
        transform: rotate(360deg);
      }
    }

    #error-panel {
      position: fixed;
      top: 50%;
      left: 50%;
      z-index: 100;
      display: none;
      width: min(680px, calc(100vw - 40px));
      transform: translate(-50%, -50%);
      padding: 24px 28px;
      color: #ffb4bd;
      background: rgba(42, 5, 12, 0.82);
      border: 1px solid rgba(255, 72, 96, 0.72);
      border-radius: 18px;
      box-shadow:
        0 0 30px rgba(255, 38, 74, 0.28),
        inset 0 0 30px rgba(255, 38, 74, 0.08);
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      text-align: center;
      line-height: 1.7;
      word-break: break-word;
    }

    #error-panel strong {
      display: block;
      margin-bottom: 10px;
      color: #ff536b;
      font-size: 20px;
      text-shadow: 0 0 14px rgba(255, 53, 82, 0.6);
    }

    #modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      visibility: hidden;
      opacity: 0;
      background:
        radial-gradient(
          circle at center,
          rgba(20, 35, 68, 0.2),
          rgba(0, 0, 0, 0.7)
        );
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition:
        opacity 180ms ease,
        visibility 180ms ease;
    }

    #modal-overlay.visible {
      visibility: visible;
      opacity: 1;
    }

    #node-card {
      position: relative;
      width: min(480px, 100%);
      padding: 34px;
      overflow: hidden;
      border: 1px solid rgba(115, 226, 255, 0.3);
      border-radius: 26px;
      background:
        linear-gradient(
          145deg,
          rgba(18, 32, 61, 0.86),
          rgba(7, 11, 27, 0.78)
        );
      box-shadow:
        0 28px 90px rgba(0, 0, 0, 0.58),
        0 0 34px rgba(50, 218, 255, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(26px) saturate(145%);
      -webkit-backdrop-filter: blur(26px) saturate(145%);
      transform: translateY(18px) scale(0.96);
      transition: transform 220ms ease;
    }

    #modal-overlay.visible #node-card {
      transform: translateY(0) scale(1);
    }

    #node-card::before {
      content: "";
      position: absolute;
      top: -120px;
      right: -120px;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: radial-gradient(
        circle,
        rgba(60, 227, 255, 0.25),
        transparent 67%
      );
      pointer-events: none;
    }

    #node-card::after {
      content: "";
      position: absolute;
      bottom: -150px;
      left: -110px;
      width: 290px;
      height: 290px;
      border-radius: 50%;
      background: radial-gradient(
        circle,
        rgba(156, 83, 255, 0.2),
        transparent 66%
      );
      pointer-events: none;
    }

    #close-modal {
      position: absolute;
      top: 18px;
      right: 18px;
      z-index: 2;
      width: 38px;
      height: 38px;
      padding: 0;
      color: #d7f8ff;
      font-size: 24px;
      line-height: 36px;
      border: 1px solid rgba(145, 227, 255, 0.25);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.06);
      cursor: pointer;
      transition:
        transform 150ms ease,
        background 150ms ease,
        border-color 150ms ease;
    }

    #close-modal:hover {
      transform: rotate(90deg);
      border-color: rgba(145, 227, 255, 0.65);
      background: rgba(97, 222, 255, 0.15);
    }

    .card-kicker {
      position: relative;
      z-index: 1;
      margin-bottom: 10px;
      color: #62e7ff;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    #node-name {
      position: relative;
      z-index: 1;
      margin: 0 44px 28px 0;
      color: #f3fcff;
      font-size: clamp(25px, 5vw, 36px);
      line-height: 1.25;
      text-shadow: 0 0 24px rgba(84, 229, 255, 0.32);
      word-break: break-word;
    }

    .node-info-grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 28px;
    }

    .info-item {
      min-width: 0;
      padding: 16px;
      border: 1px solid rgba(143, 222, 255, 0.14);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.045);
    }

    .info-label {
      display: block;
      margin-bottom: 7px;
      color: #7f9ab8;
      font-size: 12px;
      letter-spacing: 0.08em;
    }

    .info-value {
      display: block;
      overflow: hidden;
      color: #edfaff;
      font-size: 17px;
      font-weight: 700;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #pubmed-link {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      min-height: 54px;
      padding: 14px 18px;
      color: #02121c;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-decoration: none;
      border: 0;
      border-radius: 16px;
      background: linear-gradient(100deg, #58efff, #8aa8ff 55%, #bc83ff);
      box-shadow:
        0 10px 28px rgba(86, 222, 255, 0.25),
        0 0 24px rgba(140, 111, 255, 0.22);
      transition:
        transform 160ms ease,
        box-shadow 160ms ease;
    }

    #pubmed-link:hover {
      transform: translateY(-2px);
      box-shadow:
        0 14px 32px rgba(86, 222, 255, 0.36),
        0 0 30px rgba(140, 111, 255, 0.32);
    }

    #pubmed-link:active {
      transform: translateY(0);
    }

    .pubmed-icon {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    @media (max-width: 520px) {
      #node-card {
        padding: 28px 22px 24px;
        border-radius: 22px;
      }

      .node-info-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div id="graph"></div>

  <div id="loading">
    <div class="loading-ring"></div>
    <div>正在加载知识图谱</div>
  </div>

  <div id="error-panel" role="alert">
    <strong>数据加载失败</strong>
    <span id="error-message"></span>
  </div>

  <div id="modal-overlay" aria-hidden="true">
    <article
      id="node-card"
      role="dialog"
      aria-modal="true"
      aria-labelledby="node-name"
    >
      <button id="close-modal" type="button" aria-label="关闭">×</button>

      <div class="card-kicker">Research Entity</div>
      <h2 id="node-name"></h2>

      <div class="node-info-grid">
        <div class="info-item">
          <span class="info-label">实体类型</span>
          <span class="info-value" id="node-type"></span>
        </div>

        <div class="info-item">
          <span class="info-label">相关文献数</span>
          <span class="info-value" id="node-evidence-count"></span>
        </div>
      </div>

      <a
        id="pubmed-link"
        href="#"
        target="_blank"
        rel="noopener noreferrer"
      >
        <svg class="pubmed-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path
            d="M14 3a1 1 0 1 0 0 2h3.586l-7.293 7.293a1 1 0 0 0 1.414 1.414L19 6.414V10a1 1 0 1 0 2 0V3h-7ZM5 5a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-5a1 1 0 1 0-2 0v5H5V7h5a1 1 0 1 0 0-2H5Z"
          />
        </svg>
        在 PubMed 中检索
      </a>
    </article>
  </div>

  <script>
    (() => {
      "use strict";

      const graphElement = document.getElementById("graph");
      const loadingElement = document.getElementById("loading");
      const errorPanel = document.getElementById("error-panel");
      const errorMessage = document.getElementById("error-message");

      const modalOverlay = document.getElementById("modal-overlay");
      const closeModalButton = document.getElementById("close-modal");
      const nodeNameElement = document.getElementById("node-name");
      const nodeTypeElement = document.getElementById("node-type");
      const evidenceCountElement = document.getElementById(
        "node-evidence-count"
      );
      const pubmedLinkElement = document.getElementById("pubmed-link");

      const colorPalette = [
        "#43E8FF",
        "#8B7CFF",
        "#FF5EDB",
        "#53FFAA",
        "#FFC857",
        "#5F9CFF",
        "#FF6F91",
        "#8CFF5A"
      ];

      let graph = null;

      function showError(error) {
        loadingElement.style.display = "none";
        errorPanel.style.display = "block";

        const message =
          error instanceof Error ? error.message : String(error);

        errorMessage.textContent = message;
        console.error(error);
      }

      function hashString(value) {
        let hash = 0;

        for (let index = 0; index < value.length; index += 1) {
          hash = (hash << 5) - hash + value.charCodeAt(index);
          hash |= 0;
        }

        return Math.abs(hash);
      }

      function getNodeColor(node) {
        const type = String(node.type || "unknown");
        return colorPalette[hashString(type) % colorPalette.length];
      }

      function getNodeRadius(node) {
        const count = Number(node.evidence_count) || 0;
        return Math.max(3.5, Math.min(8, 3.5 + Math.log10(count + 1) * 1.7));
      }

      function createGlowTexture(color) {
        const size = 256;
        const canvas = document.createElement("canvas");
        canvas.width = size;
        canvas.height = size;

        const context = canvas.getContext("2d");
        const center = size / 2;
        const gradient = context.createRadialGradient(
          center,
          center,
          0,
          center,
          center,
          center
        );

        gradient.addColorStop(0, "rgba(255,255,255,1)");
        gradient.addColorStop(0.12, color);
        gradient.addColorStop(0.38, `${color}AA`);
        gradient.addColorStop(0.7, `${color}28`);
        gradient.addColorStop(1, "rgba(0,0,0,0)");

        context.fillStyle = gradient;
        context.fillRect(0, 0, size, size);

        const texture = new THREE.CanvasTexture(canvas);
        texture.colorSpace = THREE.SRGBColorSpace;
        texture.needsUpdate = true;

        return texture;
      }

      function createNodeObject(node) {
        const group = new THREE.Group();
        const radius = getNodeRadius(node);
        const color = getNodeColor(node);
        const threeColor = new THREE.Color(color);

        const innerGeometry = new THREE.SphereGeometry(radius, 36, 36);
        const innerMaterial = new THREE.MeshStandardMaterial({
          color: threeColor,
          emissive: threeColor,
          emissiveIntensity: 2.4,
          roughness: 0.22,
          metalness: 0.18,
          transparent: true,
          opacity: 0.98
        });

        const innerSphere = new THREE.Mesh(innerGeometry, innerMaterial);
        innerSphere.renderOrder = 2;
        group.add(innerSphere);

        const outerGeometry = new THREE.SphereGeometry(
          radius * 1.42,
          36,
          36
        );
        const outerMaterial = new THREE.MeshBasicMaterial({
          color: threeColor,
          transparent: true,
          opacity: 0.16,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
          side: THREE.BackSide
        });

        const outerSphere = new THREE.Mesh(outerGeometry, outerMaterial);
        outerSphere.renderOrder = 1;
        group.add(outerSphere);

        const glowMaterial = new THREE.SpriteMaterial({
          map: createGlowTexture(color),
          color: threeColor,
          transparent: true,
          opacity: 0.7,
          blending: THREE.AdditiveBlending,
          depthWrite: false
        });

        const glowSprite = new THREE.Sprite(glowMaterial);
        glowSprite.scale.set(radius * 5.5, radius * 5.5, 1);
        glowSprite.renderOrder = 0;
        group.add(glowSprite);

        const label = new SpriteText(String(node.name || node.id));
        label.color = "#F2FCFF";
        label.textHeight = Math.max(2.8, Math.min(4.4, radius * 0.65));
        label.backgroundColor = "rgba(2, 8, 20, 0.68)";
        label.padding = 2.4;
        label.borderRadius = 4;
        label.strokeWidth = 0.8;
        label.strokeColor = "rgba(0, 0, 0, 0.95)";
        label.position.set(0, -(radius * 1.85 + 2.4), 0);
        label.material.depthWrite = false;
        label.material.depthTest = false;
        label.renderOrder = 999;
        group.add(label);

        group.userData.innerSphere = innerSphere;
        group.userData.outerSphere = outerSphere;
        group.userData.glowSprite = glowSprite;
        group.userData.baseRadius = radius;
        group.userData.phase = Math.random() * Math.PI * 2;

        return group;
      }

      function createStarField() {
        const starCount = 3200;
        const positions = new Float32Array(starCount * 3);
        const colors = new Float32Array(starCount * 3);

        const coolColor = new THREE.Color("#8EEBFF");
        const violetColor = new THREE.Color("#B49AFF");
        const whiteColor = new THREE.Color("#FFFFFF");

        for (let index = 0; index < starCount; index += 1) {
          const radius = 550 + Math.random() * 1650;
          const theta = Math.random() * Math.PI * 2;
          const phi = Math.acos(2 * Math.random() - 1);

          positions[index * 3] = radius * Math.sin(phi) * Math.cos(theta);
          positions[index * 3 + 1] =
            radius * Math.sin(phi) * Math.sin(theta);
          positions[index * 3 + 2] = radius * Math.cos(phi);

          const selectedColor =
            Math.random() < 0.55
              ? whiteColor
              : Math.random() < 0.55
                ? coolColor
                : violetColor;

          const brightness = 0.5 + Math.random() * 0.5;

          colors[index * 3] = selectedColor.r * brightness;
          colors[index * 3 + 1] = selectedColor.g * brightness;
          colors[index * 3 + 2] = selectedColor.b * brightness;
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute(
          "position",
          new THREE.BufferAttribute(positions, 3)
        );
        geometry.setAttribute("color", new THREE.BufferAttribute(colors, 3));

        const material = new THREE.PointsMaterial({
          size: 1.6,
          sizeAttenuation: true,
          vertexColors: true,
          transparent: true,
          opacity: 0.88,
          blending: THREE.AdditiveBlending,
          depthWrite: false
        });

        const stars = new THREE.Points(geometry, material);
        stars.name = "background-stars";

        return stars;
      }

      function validateNodes(nodes) {
        if (!Array.isArray(nodes)) {
          throw new Error(
            "nodes.json 格式错误：根数据必须是数组，例如 [{\"id\":\"N001\",\"name\":\"实体名称\",\"type\":\"实体类型\",\"evidence_count\":1}]。"
          );
        }

        const ids = new Set();

        nodes.forEach((node, index) => {
          if (!node || typeof node !== "object") {
            throw new Error(
              `nodes.json 第 ${index + 1} 项格式错误：节点必须是对象。`
            );
          }

          if (
            typeof node.id !== "string" ||
            node.id.trim() === ""
          ) {
            throw new Error(
              `nodes.json 第 ${index + 1} 项缺少有效的字符串字段 id。`
            );
          }

          if (
            typeof node.name !== "string" ||
            node.name.trim() === ""
          ) {
            throw new Error(
              `nodes.json 中节点 ${node.id} 缺少有效的字符串字段 name。`
            );
          }

          if (
            typeof node.type !== "string" ||
            node.type.trim() === ""
          ) {
            throw new Error(
              `nodes.json 中节点 ${node.id} 缺少有效的字符串字段 type。`
            );
          }

          if (
            typeof node.evidence_count !== "number" ||
            !Number.isFinite(node.evidence_count)
          ) {
            throw new Error(
              `nodes.json 中节点 ${node.id} 的 evidence_count 必须是有效数字。`
            );
          }

          if (ids.has(node.id)) {
            throw new Error(
              `nodes.json 存在重复节点 id：${node.id}。`
            );
          }

          ids.add(node.id);
        });

        return ids;
      }

      function validateEdges(edges, nodeIds) {
        if (!Array.isArray(edges)) {
          throw new Error(
            "edges.json 格式错误：根数据必须是数组，例如 [{\"source\":\"N001\",\"target\":\"N002\",\"relation\":\"促进\"}]。"
          );
        }

        edges.forEach((edge, index) => {
          if (!edge || typeof edge !== "object") {
            throw new Error(
              `edges.json 第 ${index + 1} 项格式错误：连接必须是对象。`
            );
          }

          if (
            typeof edge.source !== "string" ||
            edge.source.trim() === ""
          ) {
            throw new Error(
              `edges.json 第 ${index + 1} 项缺少有效的字符串字段 source。`
            );
          }

          if (
            typeof edge.target !== "string" ||
            edge.target.trim() === ""
          ) {
            throw new Error(
              `edges.json 第 ${index + 1} 项缺少有效的字符串字段 target。`
            );
          }

          if (
            typeof edge.relation !== "string" ||
            edge.relation.trim() === ""
          ) {
            throw new Error(
              `edges.json 第 ${index + 1} 项缺少有效的字符串字段 relation。`
            );
          }

          if (!nodeIds.has(edge.source)) {
            throw new Error(
              `edges.json 第 ${index + 1} 项引用了不存在的 source 节点：${edge.source}。`
            );
          }

          if (!nodeIds.has(edge.target)) {
            throw new Error(
              `edges.json 第 ${index + 1} 项引用了不存在的 target 节点：${edge.target}。`
            );
          }
        });
      }

      async function fetchJson(filename) {
        let response;

        try {
          response = await fetch(filename, {
            method: "GET",
            cache: "no-store"
          });
        } catch (error) {
          throw new Error(
            `无法请求 ${filename}：${error.message}。请确认文件与 index.html 位于同一目录，并通过 GitHub Pages 或本地 HTTP 服务器访问。`
          );
        }

        if (!response.ok) {
          throw new Error(
            `加载 ${filename} 失败：HTTP ${response.status} ${response.statusText || ""}。请确认文件名、路径和大小写完全正确。`
          );
        }

        try {
          return await response.json();
        } catch (error) {
          throw new Error(
            `${filename} 不是有效的 JSON：${error.message}`
          );
        }
      }

      function openNodeModal(node) {
        const nodeName = String(node.name || node.id);
        const nodeType = String(node.type || "未知");
        const evidenceCount = Number(node.evidence_count) || 0;

        nodeNameElement.textContent = nodeName;
        nodeTypeElement.textContent = nodeType;
        evidenceCountElement.textContent =
          evidenceCount.toLocaleString("zh-CN");

        pubmedLinkElement.href =
          `https://pubmed.ncbi.nlm.nih.gov/?term=${encodeURIComponent(nodeName)}`;

        modalOverlay.classList.add("visible");
        modalOverlay.setAttribute("aria-hidden", "false");
        closeModalButton.focus();
      }

      function closeNodeModal() {
        modalOverlay.classList.remove("visible");
        modalOverlay.setAttribute("aria-hidden", "true");
      }

      function animateNodeGlow() {
        if (!graph) {
          return;
        }

        const elapsed = performance.now() * 0.001;

        graph.graphData().nodes.forEach((node) => {
          const object = node.__threeObj;

          if (!object || !object.userData.innerSphere) {
            return;
          }

          const phase = object.userData.phase;
          const pulse = 1 + Math.sin(elapsed * 1.7 + phase) * 0.035;
          const haloPulse =
            1 + Math.sin(elapsed * 1.25 + phase) * 0.08;

          object.userData.innerSphere.scale.setScalar(pulse);
          object.userData.outerSphere.scale.setScalar(haloPulse);
          object.userData.glowSprite.material.opacity =
            0.58 + Math.sin(elapsed * 1.45 + phase) * 0.12;
        });

        requestAnimationFrame(animateNodeGlow);
      }

      function initializeGraph(nodes, edges) {
        graph = ForceGraph3D()(graphElement)
          .width(window.innerWidth)
          .height(window.innerHeight)
          .backgroundColor("#010207")
          .showNavInfo(false)
          .graphData({
            nodes,
            links: edges
          })
          .nodeId("id")
          .nodeThreeObject(createNodeObject)
          .nodeThreeObjectExtend(false)
          .nodeLabel(() => "")
          .linkSource("source")
          .linkTarget("target")
          .linkColor((link) =>
            String(link.relation).includes("抑制")
              ? "rgba(255, 63, 116, 0.72)"
              : "rgba(69, 224, 255, 0.68)"
          )
          .linkWidth((link) =>
            String(link.relation).includes("抑制") ? 1.15 : 0.9
          )
          .linkOpacity(0.72)
          .linkDirectionalArrowLength(3.6)
          .linkDirectionalArrowRelPos(0.86)
          .linkDirectionalArrowColor((link) =>
            String(link.relation).includes("抑制")
              ? "#FF477F"
              : "#58E9FF"
          )
          .linkDirectionalParticles((link) =>
            String(link.relation).includes("抑制") ? 5 : 4
          )
          .linkDirectionalParticleWidth((link) =>
            String(link.relation).includes("抑制") ? 2.1 : 1.8
          )
          .linkDirectionalParticleSpeed((link) =>
            String(link.relation).includes("抑制") ? 0.006 : 0.004
          )
          .linkDirectionalParticleColor((link) =>
            String(link.relation).includes("抑制")
              ? "#FF4D88"
              : "#75F3FF"
          )
          .linkDirectionalParticleResolution(12)
          .onNodeClick(openNodeModal)
          .onNodeHover((node) => {
            graphElement.style.cursor = node ? "pointer" : "default";
          })
          .warmupTicks(90)
          .cooldownTicks(180)
          .d3AlphaDecay(0.022)
          .d3VelocityDecay(0.3);

        graph.d3Force("charge").strength(-155);
        graph.d3Force("link").distance(55);

        const scene = graph.scene();
        scene.add(createStarField());

        const hemisphereLight = new THREE.HemisphereLight(
          "#A7EFFF",
          "#130822",
          1.5
        );
        scene.add(hemisphereLight);

        const cyanLight = new THREE.PointLight(
          "#42E8FF",
          2800,
          1200,
          1.8
        );
        cyanLight.position.set(220, 180, 260);
        scene.add(cyanLight);

        const violetLight = new THREE.PointLight(
          "#9A68FF",
          2300,
          1000,
          1.8
        );
        violetLight.position.set(-240, -100, -180);
        scene.add(violetLight);

        scene.fog = new THREE.FogExp2("#010207", 0.00042);

        const renderer = graph.renderer();
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.25;

        const controls = graph.controls();
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.34;
        controls.minDistance = 70;
        controls.maxDistance = 1100;

        graph.cameraPosition(
          {
            x: 0,
            y: 40,
            z: Math.max(260, 190 + Math.sqrt(nodes.length) * 25)
          },
          { x: 0, y: 0, z: 0 },
          0
        );

        loadingElement.style.display = "none";
        animateNodeGlow();
      }

      closeModalButton.addEventListener("click", closeNodeModal);

      modalOverlay.addEventListener("click", (event) => {
        if (event.target === modalOverlay) {
          closeNodeModal();
        }
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          closeNodeModal();
        }
      });

      window.addEventListener("resize", () => {
        if (!graph) {
          return;
        }

        graph
          .width(window.innerWidth)
          .height(window.innerHeight);
      });

      Promise.all([
        fetchJson("./nodes.json"),
        fetchJson("./edges.json")
      ])
        .then(([nodes, edges]) => {
          const nodeIds = validateNodes(nodes);
          validateEdges(edges, nodeIds);
          initializeGraph(nodes, edges);
        })
        .catch(showError);
    })();
  </script>
</body>
</html>
