<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>免疫知识星云</title>
    <!-- 引入高级极简字体 Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/3d-force-graph@1"></script>
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #02050d; /* 极深邃的宇宙黑/蓝 */
            font-family: 'Inter', sans-serif; 
            color: #fff; 
        }
        #graph-container { width: 100vw; height: 100vh; }
        
        /* ---------------- 顶部 UI ---------------- */
        .ui-header {
            position: absolute;
            top: 24px;
            left: 28px;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .main-title {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 1.2px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .main-title .light { color: #ffffff; text-shadow: 0 0 20px rgba(255,255,255,0.1); }
        .main-title .accent { 
            color: #00e5ff; 
            background: linear-gradient(135deg, #00e5ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
        }
        .subtitle {
            font-size: 13px;
            font-weight: 400;
            color: #56647a;
            letter-spacing: 1px;
        }

        /* ---------------- 搜索栏 ---------------- */
        .search-box-wrap {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            pointer-events: none;
            width: 280px;
        }
        .search-box {
            pointer-events: auto;
            width: 100%;
            padding: 12px 18px;
            border: 1px solid rgba(0, 229, 255, 0.15);
            border-radius: 40px;
            background: rgba(10, 16, 30, 0.7);
            backdrop-filter: blur(12px);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
            text-align: center;
        }
        .search-box:focus {
            border-color: #00e5ff;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
            background: rgba(10, 16, 30, 0.9);
        }
        .search-box::placeholder { color: #46516b; text-align: center; }

        /* ---------------- 毛玻璃弹窗卡片 ---------------- */
        #node-detail { 
            display: none; 
            position: absolute; 
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            background: rgba(8, 14, 30, 0.85); 
            backdrop-filter: blur(24px); 
            border: 1px solid rgba(0, 229, 255, 0.2); 
            border-radius: 20px; 
            padding: 32px 40px; 
            min-width: 260px; 
            max-width: 400px; 
            box-shadow: 0 0 60px rgba(0, 229, 255, 0.08); 
            z-index: 20; 
            text-align: center;
            pointer-events: auto;
        }
        #node-detail .close-btn { 
            position: absolute; top: 12px; right: 16px; 
            background: transparent; border: none; color: #46516b; font-size: 18px; cursor: pointer; 
            transition: 0.2s;
        }
        #node-detail .close-btn:hover { color: #fff; }
        #node-detail h2 { margin: 0 0 8px 0; font-weight: 600; font-size: 20px; color: #fff; }
        #node-detail .type { display: inline-block; padding: 2px 10px; border-radius: 12px; background: rgba(0, 229, 255, 0.1); color: #00e5ff; font-size: 12px; border: 1px solid rgba(0, 229, 255, 0.1); }
        #node-detail .desc { margin-top: 12px; font-size: 13px; color: #8a98b6; }
        .pubmed-btn { 
            display: inline-flex; align-items: center; justify-content: center;
            margin-top: 16px; padding: 8px 20px; 
            background: #00e5ff; color: #02050d; border-radius: 24px; 
            text-decoration: none; font-weight: 600; font-size: 13px; transition: 0.25s;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.1);
        }
        .pubmed-btn:hover { background: #ffffff; box-shadow: 0 0 25px rgba(255, 255, 255, 0.2); transform: scale(1.02); }

        .loading-text { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            color: #46516b; font-size: 14px; letter-spacing: 2px; 
            background: rgba(0,0,0,0.5); padding: 6px 16px; border-radius: 20px;
        }
    </style>
</head>
<body>
    <div class="ui-header">
        <div class="main-title">
            <span class="light">免疫</span><span class="accent">知识星云</span>
        </div>
        <div class="subtitle">▸ PubMed 文献 AI 自动抽取</div>
    </div>

    <div class="search-box-wrap">
        <input type="text" class="search-box" id="node-search" placeholder="🔍 搜索免疫实体...">
    </div>

    <div id="graph-container"></div>
    <div class="loading-text" id="loading-text">Loading Nebula...</div>

    <div id="node-detail">
        <button class="close-btn" onclick="document.getElementById('node-detail').style.display='none'">✖</button>
        <h2 id="detail-name">节点名称</h2>
        <span class="type" id="detail-type-span">未知类型</span>
        <p class="desc" id="detail-evidence">关联文献：0 篇</p>
        <a href="#" target="_blank" id="detail-link" class="pubmed-btn">📄 查阅 PubMed 文献</a>
    </div>

    <script>
        document.getElementById('loading-text').style.display = 'block';

        fetch('nodes.json')
            .then(res => res.json())
            .then(nodes => {
                return fetch('edges.json')
                    .then(res => res.json())
                    .then(edges => {
                        document.getElementById('loading-text').style.display = 'none';
                        
                        const formattedNodes = nodes.map(node => {
                            let name = node.name || node.label || node.id;
                            return {
                                id: name,
                                name: name,
                                type: node.type || node.entity_type || node.category || "其他",
                                val: (node.evidence_count || 1) * 0.8 + 1, 
                                // 纯净的蓝紫渐变调色盘
                                color: ['#00e5ff', '#818cf8', '#a78bfa', '#34d399', '#f472b6'][Math.floor(Math.random() * 5)]
                            };
                        });

                        const formattedEdges = edges.map(edge => {
                            return {
                                source: edge.source || edge.source_id || edge.from,
                                target: edge.target || edge.target_id || edge.to,
                                value: edge.relation || edge.label || edge.predicate || "关联"
                            };
                        });

                        const graphData = { nodes: formattedNodes, links: formattedEdges };

                        const Graph = ForceGraph3D()
                            (document.getElementById('graph-container'))
                            .graphData(graphData)
                            .nodeLabel(node => `${node.name}`)
                            .nodeAutoColorBy('type')
                            .linkDirectionalParticles(2)
                            .linkDirectionalParticleSpeed(0.005)
                            .linkWidth(1)
                            .linkOpacity(0.5)
                            .d3AlphaDecay(0.02)
                            .d3VelocityDecay(0.3)
                            .nodeRelSize(5)
                            .enableAutoRotate(true) // ✨ 开启星云缓慢自转，质感瞬间拉满
                            .autoRotateSpeed(0.8)
                            .onNodeClick(node => {
                                const detail = document.getElementById('node-detail');
                                document.getElementById('detail-name').innerText = node.name;
                                document.getElementById('detail-type-span').innerText = node.type;
                                document.getElementById('detail-evidence').innerText = `关联文献：${node.evidence_count || 0} 篇`;
                                document.getElementById('detail-link').href = `https://pubmed.ncbi.nlm.nih.gov/?term=${encodeURIComponent(node.name)}`;
                                detail.style.display = 'block';
                            });

                        // 高级搜索交互：搜索时关闭自动旋转，聚焦到节点后再缓慢打开
                        document.getElementById('node-search').addEventListener('input', (e) => {
                            const searchTerm = e.target.value.trim();
                            if (searchTerm === '') {
                                Graph.nodeColor(null);
                                Graph.enableAutoRotate(true);
                            } else {
                                Graph.enableAutoRotate(false);
                                Graph.nodeColor(node => {
                                    return node.name.includes(searchTerm) ? '#f472b6' : '#334155';
                                });
                                const targetNode = formattedNodes.find(n => n.name.includes(searchTerm));
                                if (targetNode) {
                                    Graph.cameraPosition({ x: targetNode.x + 10, y: targetNode.y + 10, z: 80 });
                                }
                            }
                        });
                    });
            })
            .catch(err => {
                document.getElementById('graph-container').innerHTML = `<p style="color:#46516b;padding:20px;text-align:center;font-size:14px;">数据加载失败，请确保 nodes.json 和 edges.json 已上传</p>`;
                document.getElementById('loading-text').style.display = 'none';
                console.error(err);
            });
    </script>
</body>
</html>
