<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#02040b" />
  <title>中医免疫 PubMed 3D 知识图谱</title>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three-spritetext@1.9.3/dist/three-spritetext.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/3d-force-graph@1.73.4/dist/3d-force-graph.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.26.0/dist/index.js"></script>

  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      --panel: rgba(8, 15, 32, .88);
      --panel-2: rgba(12, 24, 48, .78);
      --line: rgba(115, 221, 255, .22);
      --cyan: #6feaff;
      --text: #edfaff;
      --muted: #86a0bd;
      --danger: #ff647e;
      --success: #73efbd;
      --gold: #e8ff77;
    }
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #010208; }
    button, input, select, textarea { font: inherit; }
    button { -webkit-tap-highlight-color: transparent; }
    #graph { position: fixed; inset: 0; background: radial-gradient(circle at 52% 45%, #0d1830 0, #040713 40%, #010208 75%); }
    #graph canvas { display: block; outline: none; }

    .glass {
      border: 1px solid var(--line);
      background: linear-gradient(145deg, rgba(15, 29, 56, .9), rgba(3, 8, 20, .88));
      box-shadow: 0 24px 80px rgba(0,0,0,.55), inset 0 1px rgba(255,255,255,.07);
      backdrop-filter: blur(22px) saturate(145%);
      -webkit-backdrop-filter: blur(22px) saturate(145%);
    }

    #loading, #error-panel {
      position: fixed; inset: 50% auto auto 50%; transform: translate(-50%, -50%); z-index: 1000;
    }
    #loading { display: flex; flex-direction: column; align-items: center; gap: 14px; color: #c8f5ff; letter-spacing: .12em; }
    .spinner { width: 52px; height: 52px; border: 2px solid rgba(94,228,255,.2); border-top-color: #6defff; border-right-color: #a787ff; border-radius: 50%; animation: spin 1s linear infinite; box-shadow: 0 0 25px rgba(70,220,255,.3); }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error-panel { display: none; width: min(720px, calc(100vw - 32px)); padding: 28px; color: #ffcbd2; text-align: center; border: 1px solid rgba(255,78,103,.7); border-radius: 22px; background: rgba(43,5,14,.94); box-shadow: 0 0 40px rgba(255,40,72,.25); }
    #error-panel strong { display: block; margin-bottom: 10px; color: var(--danger); font-size: 23px; }
    #error-message { white-space: pre-wrap; line-height: 1.7; }

    #top-tip { position: fixed; top: 15px; left: 50%; z-index: 80; transform: translateX(-50%); padding: 9px 16px; max-width: min(760px, calc(100vw - 150px)); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #cfefff; font-size: 12px; border: 1px solid rgba(110,220,255,.18); border-radius: 999px; background: rgba(3,10,24,.66); pointer-events: none; }

    #control-shell { position: fixed; left: 16px; top: 16px; z-index: 200; width: 370px; max-height: calc(100vh - 32px); border-radius: 24px; transition: width .2s ease, height .2s ease; overflow: hidden; }
    #control-shell.collapsed { width: 58px; height: 58px; border-radius: 18px; }
    #panel-toggle { position: absolute; right: 12px; top: 12px; z-index: 5; width: 42px; height: 42px; display: grid; place-items: center; color: var(--cyan); border: 1px solid rgba(111,230,255,.28); border-radius: 14px; background: rgba(18,40,65,.72); cursor: pointer; }
    #panel-toggle svg { width: 21px; fill: none; stroke: currentColor; stroke-width: 2; }
    #control-shell.collapsed #panel-toggle { right: 8px; top: 8px; }
    #panel-content { max-height: calc(100vh - 32px); overflow: hidden; transition: opacity .15s; }
    #control-shell.collapsed #panel-content { opacity: 0; pointer-events: none; }
    .panel-head { padding: 19px 68px 8px 20px; }
    .panel-head h1 { margin: 0; font-size: 20px; color: var(--text); }
    .panel-head p { margin: 7px 0 0; color: var(--muted); font-size: 12px; line-height: 1.5; }
    .tabs { display: flex; gap: 5px; padding: 9px 14px 10px; overflow-x: auto; }
    .tab-btn { flex: 0 0 auto; padding: 8px 10px; color: #93abc5; font-size: 11px; border: 1px solid transparent; border-radius: 10px; background: transparent; cursor: pointer; }
    .tab-btn.active { color: #05141d; font-weight: 800; background: linear-gradient(100deg,#68ecff,#b08cff); }
    .panel-scroll { max-height: calc(100vh - 145px); padding: 0 14px 18px; overflow-y: auto; scrollbar-width: thin; }
    .tab-page { display: none; }
    .tab-page.active { display: block; }
    .section { margin-top: 10px; padding: 13px; border: 1px solid rgba(117,218,255,.12); border-radius: 16px; background: rgba(255,255,255,.025); }
    .section-title { margin: 0 0 10px; color: #dff8ff; font-size: 13px; font-weight: 800; }
    .hint { color: #708ba8; font-size: 11px; line-height: 1.5; }
    .field { margin-bottom: 10px; }
    .field label { display: block; margin-bottom: 5px; color: #8da6c0; font-size: 11px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; }
    input, select { width: 100%; height: 39px; padding: 0 10px; color: #edfbff; border: 1px solid rgba(116,218,255,.18); border-radius: 11px; outline: none; background: rgba(0,5,17,.72); }
    input:focus, select:focus { border-color: rgba(100,234,255,.62); box-shadow: 0 0 0 3px rgba(72,220,255,.08); }
    input[type="checkbox"] { width: auto; height: auto; accent-color: #65eaff; }
    input[type="range"] { padding: 0; height: 28px; border: 0; background: transparent; }
    .check-row { display: flex; align-items: center; gap: 7px; color: #9bb3ca; font-size: 12px; }
    .actions { display: flex; gap: 7px; flex-wrap: wrap; }
    .btn { min-height: 37px; padding: 8px 12px; color: #dffaff; font-size: 12px; font-weight: 700; border: 1px solid rgba(106,224,255,.22); border-radius: 11px; background: rgba(72,219,255,.07); cursor: pointer; }
    .btn:hover { border-color: rgba(106,224,255,.6); background: rgba(72,219,255,.14); }
    .btn.primary { color: #04151d; border: 0; background: linear-gradient(100deg,#67edff,#a98bff); }
    .btn.danger { color: #ffc0ca; border-color: rgba(255,93,117,.25); background: rgba(255,70,96,.07); }
    .btn.active { color: #07151b; background: var(--gold); }
    .status { min-height: 18px; margin-top: 8px; color: #7e99b5; font-size: 11px; line-height: 1.5; }
    .status.ok { color: var(--success); } .status.error { color: var(--danger); }
    .result-list { display: flex; flex-direction: column; gap: 6px; max-height: 230px; margin-top: 9px; overflow-y: auto; }
    .result-item { display: grid; grid-template-columns: minmax(0,1fr) auto; gap: 8px; align-items: center; padding: 9px 10px; text-align: left; border: 1px solid rgba(110,218,255,.1); border-radius: 11px; background: rgba(255,255,255,.025); cursor: pointer; }
    .result-item:hover { border-color: rgba(100,230,255,.38); background: rgba(70,220,255,.07); }
    .result-name { overflow: hidden; color: #ecfbff; font-size: 12px; font-weight: 750; text-overflow: ellipsis; white-space: nowrap; }
    .result-sub { margin-top: 3px; color: #6e89a5; font-size: 10px; }
    .badge { display: inline-flex; align-items: center; padding: 4px 7px; color: #a9edff; font-size: 10px; border-radius: 999px; background: rgba(76,218,255,.08); }
    .legend { display: flex; flex-direction: column; gap: 6px; }
    .legend-row { display: grid; grid-template-columns: 13px minmax(0,1fr) auto; gap: 8px; align-items: center; padding: 7px 8px; border-radius: 9px; cursor: pointer; }
    .legend-row:hover { background: rgba(255,255,255,.04); }
    .legend-row.off { opacity: .35; }
    .dot { width: 10px; height: 10px; border-radius: 50%; box-shadow: 0 0 9px currentColor; }
    .legend-name { color: #cfe8f4; font-size: 11px; }
    .legend-count { color: #66829e; font-size: 10px; }
    #time-chart { width: 100%; height: 100px; border-radius: 10px; background: rgba(0,4,14,.55); }
    .compare-output { margin-top: 9px; padding: 10px; color: #a9bfd1; font-size: 11px; line-height: 1.65; border-radius: 10px; background: rgba(0,5,16,.55); white-space: pre-wrap; }
    .path-output { margin-top: 8px; color: #d9f6ff; font-size: 11px; line-height: 1.6; word-break: break-word; }

    #reset-view, #selection-toolbar { position: fixed; z-index: 160; bottom: 18px; }
    #reset-view { right: 18px; display: none; }
    #reset-view.visible { display: inline-flex; }
    #selection-toolbar { left: 50%; transform: translateX(-50%); display: none; gap: 7px; padding: 8px; border-radius: 14px; }
    #selection-toolbar.visible { display: flex; }
    #selection-rect { position: fixed; z-index: 500; display: none; border: 1px solid #73efff; background: rgba(78,220,255,.12); pointer-events: none; }

    .overlay { position: fixed; inset: 0; z-index: 600; display: flex; align-items: center; justify-content: center; padding: 20px; visibility: hidden; opacity: 0; background: rgba(0,1,8,.7); backdrop-filter: blur(10px); transition: .18s; }
    .overlay.visible { visibility: visible; opacity: 1; }
    .modal { position: relative; width: min(760px, 100%); max-height: min(88vh, 900px); padding: 24px; overflow-y: auto; border-radius: 24px; transform: translateY(14px) scale(.98); transition: .2s; }
    .overlay.visible .modal { transform: none; }
    .close { position: absolute; right: 14px; top: 14px; width: 38px; height: 38px; color: #dffaff; font-size: 24px; border: 1px solid rgba(120,225,255,.22); border-radius: 50%; background: rgba(255,255,255,.05); cursor: pointer; }
    .kicker { color: var(--cyan); font-size: 11px; font-weight: 800; letter-spacing: .16em; text-transform: uppercase; }
    .modal h2 { margin: 8px 48px 17px 0; color: #f0fbff; font-size: 28px; line-height: 1.25; }
    .info-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 9px; margin-bottom: 16px; }
    .info { padding: 11px; border: 1px solid rgba(115,220,255,.12); border-radius: 12px; background: rgba(255,255,255,.03); }
    .info b { display: block; margin-bottom: 5px; color: #718da8; font-size: 10px; font-weight: 600; }
    .info span { color: #eafaff; font-size: 13px; word-break: break-word; }
    .modal-section { margin-top: 14px; padding-top: 13px; border-top: 1px solid rgba(112,218,255,.12); }
    .modal-section h3 { margin: 0 0 10px; color: #dff8ff; font-size: 14px; }
    .pub-list, .evidence-list { display: flex; flex-direction: column; gap: 9px; }
    .pub-card { padding: 12px; border: 1px solid rgba(115,218,255,.11); border-radius: 13px; background: rgba(255,255,255,.025); }
    .pub-title { color: #eefcff; font-size: 13px; font-weight: 750; line-height: 1.5; }
    .pub-meta { margin-top: 7px; color: #7e99b5; font-size: 11px; line-height: 1.6; }
    .pub-links { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 8px; }
    .pub-link { display: inline-flex; padding: 6px 9px; color: #06151c; font-size: 11px; font-weight: 800; text-decoration: none; border-radius: 9px; background: linear-gradient(100deg,#68edff,#a88eff); }
    .evidence-quote { margin-top: 8px; padding: 9px 10px; color: #b9ccdc; font-size: 11px; line-height: 1.65; border-left: 2px solid #6cecff; background: rgba(74,220,255,.045); }
    .warning { padding: 10px; color: #ffd0a7; font-size: 12px; line-height: 1.6; border: 1px solid rgba(255,163,77,.25); border-radius: 11px; background: rgba(255,130,45,.07); }
    .metrics-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .metrics-table th, .metrics-table td { padding: 8px; border-bottom: 1px solid rgba(112,218,255,.08); text-align: left; }
    .metrics-table th { color: #7893af; } .metrics-table td { color: #d7eff8; }
    .compare-table-wrap { overflow-x: auto; }

    @media (max-width: 800px) {
      #top-tip { display: none; }
      #control-shell { left: 10px; top: 10px; width: min(360px, calc(100vw - 20px)); max-height: calc(100vh - 20px); }
      #control-shell.collapsed { width: 56px; height: 56px; }
      .panel-scroll { max-height: calc(100vh - 135px); }
      .info-grid { grid-template-columns: 1fr 1fr; }
      .modal { padding: 20px 16px; }
    }
    @media (max-width: 480px) { .grid2, .grid3, .info-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div id="graph"></div>
  <div id="loading"><div class="spinner"></div><div>正在构建科研知识图谱</div></div>
  <div id="top-tip">单击节点查看证据；双击固定；点击连线查看关系证据；Shift 点击可多选</div>

  <aside id="control-shell" class="glass">
    <button id="panel-toggle" aria-label="收缩控制面板" title="收缩/展开控制面板">
      <svg viewBox="0 0 24 24"><circle cx="10.5" cy="10.5" r="6.5"></circle><path d="M15.5 15.5L21 21"></path></svg>
    </button>
    <div id="panel-content">
      <div class="panel-head"><h1>中医免疫知识图谱</h1><p>PubMed 证据检索、路径探索、时间演化与科研导出</p></div>
      <nav class="tabs">
        <button class="tab-btn active" data-tab="search">检索</button>
        <button class="tab-btn" data-tab="explore">探索</button>
        <button class="tab-btn" data-tab="time">时间</button>
        <button class="tab-btn" data-tab="display">显示</button>
        <button class="tab-btn" data-tab="export">导出</button>
      </nav>
      <div class="panel-scroll">
        <section class="tab-page active" id="tab-search">
          <div class="section">
            <h3 class="section-title">实体多条件检索</h3>
            <div class="field"><label>名称、拼音、英文或文献关键词</label><input id="q" placeholder="例：黄芪 / huangqi / inflammation" /></div>
            <div class="grid2">
              <div class="field"><label>实体类型</label><select id="type-filter"><option value="">全部类型</option></select></div>
              <div class="field"><label>新旧节点</label><select id="new-filter"><option value="all">全部</option><option value="new">仅 48 小时内新增</option><option value="old">仅旧节点</option></select></div>
            </div>
            <div class="grid2">
              <div class="field"><label>最少文献数</label><input id="min-evidence" type="number" min="0" placeholder="0" /></div>
              <div class="field"><label>最多文献数</label><input id="max-evidence" type="number" min="0" placeholder="不限" /></div>
            </div>
            <div class="field"><label>更新日期（可选）</label><input id="date-filter" placeholder="2026.7.16" /></div>
            <div class="actions"><button id="search-btn" class="btn primary">组合搜索</button><button id="clear-search" class="btn">清除</button></div>
            <div id="search-status" class="status"></div>
            <div id="search-results" class="result-list"></div>
          </div>
        </section>

        <section class="tab-page" id="tab-explore">
          <div class="section">
            <h3 class="section-title">多跳关系探索</h3>
            <div class="field"><label>起始实体</label><input id="explore-node" list="node-list" placeholder="输入或选择实体" /></div>
            <div class="field"><label>邻居深度</label><select id="hop-depth"><option value="0">仅当前节点</option><option value="1" selected>一阶邻居</option><option value="2">二阶邻居</option><option value="3">三阶邻居</option></select></div>
            <div class="actions"><button id="explore-btn" class="btn primary">开始探索</button><button id="clear-highlight" class="btn">清除高亮</button></div>
            <div id="explore-status" class="status"></div>
          </div>
          <div class="section">
            <h3 class="section-title">最短路径查询</h3>
            <div class="field"><label>起点</label><input id="path-start" list="node-list" placeholder="例：黄芪" /></div>
            <div class="field"><label>终点</label><input id="path-end" list="node-list" placeholder="例：类风湿关节炎" /></div>
            <label class="check-row"><input id="directed-path" type="checkbox" /> 仅按关系方向查询</label>
            <div class="actions" style="margin-top:9px"><button id="path-btn" class="btn primary">查找路径</button></div>
            <div id="path-output" class="path-output"></div>
          </div>
          <div class="section">
            <h3 class="section-title">节点固定、框选与研究集合</h3>
            <div class="actions"><button id="box-select-btn" class="btn">框选节点</button><button id="compare-btn" class="btn">对比已选节点</button><button id="clear-selection" class="btn">清空选择</button></div>
            <div id="selection-status" class="status">Shift 点击节点也可加入多选。</div>
            <div class="field"><label>研究集合名称</label><input id="collection-name" placeholder="例：NF-κB 炎症轴" /></div>
            <div class="actions"><button id="save-collection" class="btn">保存已选节点</button></div>
            <div id="collections" class="result-list"></div>
          </div>
        </section>

        <section class="tab-page" id="tab-time">
          <div class="section">
            <h3 class="section-title">时间轴播放</h3>
            <div class="field"><label id="timeline-label">日期</label><input id="timeline" type="range" min="0" max="0" value="0" /></div>
            <label class="check-row"><input id="cumulative" type="checkbox" /> 只显示截至该日的数据（累计模式）</label>
            <div class="actions" style="margin-top:9px"><button id="apply-time" class="btn primary">应用日期</button><button id="play-day" class="btn">按天播放</button><button id="play-week" class="btn">按周播放</button><button id="stop-play" class="btn">停止</button><button id="clear-time" class="btn">清除</button></div>
            <canvas id="time-chart" width="320" height="100"></canvas>
            <div id="time-status" class="status"></div>
          </div>
          <div class="section">
            <h3 class="section-title">数据版本比较</h3>
            <div class="grid2"><div class="field"><label>较早日期</label><input id="compare-a" placeholder="2026.7.15" /></div><div class="field"><label>较晚日期</label><input id="compare-b" placeholder="2026.7.16" /></div></div>
            <button id="version-compare" class="btn primary">比较版本</button>
            <div id="version-output" class="compare-output">支持 deleted_at 与 history 字段；当前增强数据已提供历史快照结构。</div>
          </div>
        </section>

        <section class="tab-page" id="tab-display">
          <div class="section">
            <h3 class="section-title">视觉编码</h3>
            <div class="field"><label>节点颜色</label><select id="color-mode"><option value="type">按实体类型</option><option value="community">按社区星团</option></select></div>
            <div class="field"><label>节点大小</label><select id="size-mode"><option value="evidence">按文献数</option><option value="pagerank">按 PageRank</option><option value="degree">按连接数</option><option value="betweenness">按介数中心性</option></select></div>
            <div class="field"><label>标签模式</label><select id="label-mode"><option value="all" selected>全部名称（默认）</option><option value="important">仅重要节点</option><option value="auto">随镜头距离自动</option><option value="none">隐藏名称</option></select></div>
            <label class="check-row"><input id="avoid-overlap" type="checkbox" /> 启用标签碰撞规避</label>
          </div>
          <div class="section"><h3 class="section-title">实体类型图例</h3><p class="hint">点击隐藏/显示；Ctrl/⌘ 点击可单独显示一种类型。</p><div id="type-legend" class="legend"></div></div>
          <div class="section"><h3 class="section-title">关系图例</h3><div class="legend"><div class="legend-row"><span class="dot" style="color:#67eaff;background:#67eaff"></span><span class="legend-name">促进</span></div><div class="legend-row"><span class="dot" style="color:#ff557f;background:#ff557f"></span><span class="legend-name">抑制</span></div><div class="legend-row"><span class="dot" style="color:#ffd45c;background:#ffd45c"></span><span class="legend-name">48 小时内新增关系</span></div><div class="legend-row"><span class="dot" style="color:#ff8cd8;background:#ff8cd8"></span><span class="legend-name">冲突关系</span></div></div></div>
        </section>

        <section class="tab-page" id="tab-export">
          <div class="section">
            <h3 class="section-title">截图与数据导出</h3>
            <div class="actions"><button class="btn" data-export="png">当前视角 PNG</button><button class="btn" data-export="png-transparent">透明背景 PNG</button><button class="btn" data-export="json">当前子图 JSON</button><button class="btn" data-export="csv">节点/关系 CSV</button><button class="btn" data-export="graphml">GraphML</button><button class="btn" data-export="cytoscape">Cytoscape JSON</button><button class="btn" data-export="neo4j">Neo4j Cypher</button><button class="btn" data-export="report">统计报告</button></div>
            <div id="export-status" class="status"></div>
          </div>
        </section>
      </div>
    </div>
  </aside>

  <datalist id="node-list"></datalist>
  <button id="reset-view" class="btn glass">◎ 返回当前结果</button>
  <div id="selection-toolbar" class="glass"><span class="badge" id="selected-count">已选 0</span><button id="selection-compare-bottom" class="btn">对比</button><button id="selection-clear-bottom" class="btn">清空</button></div>
  <div id="selection-rect"></div>

  <div id="error-panel"><strong>知识图谱加载失败</strong><span id="error-message"></span></div>

  <div id="node-overlay" class="overlay"><article class="modal glass"><button class="close" data-close="node-overlay">×</button><div id="node-detail"></div></article></div>
  <div id="edge-overlay" class="overlay"><article class="modal glass"><button class="close" data-close="edge-overlay">×</button><div id="edge-detail"></div></article></div>
  <div id="compare-overlay" class="overlay"><article class="modal glass"><button class="close" data-close="compare-overlay">×</button><div id="compare-detail"></div></article></div>

  <script>
  (() => {
    "use strict";

    const NEW_MS = 48 * 60 * 60 * 1000;
    const TYPE_PALETTE = ["#4DE7FF","#8978FF","#FF62C8","#55F2AF","#FFB756","#679CFF","#FF6684","#A2F55D","#67FFD9","#C17CFF","#F4E36A"];
    const $ = (id) => document.getElementById(id);
    const state = {
      graph: null, nodes: [], edges: [], nodeMap: new Map(), edgeMap: new Map(), adjacency: new Map(),
      hiddenTypes: new Set(), searchIds: null, timeNodeIds: null, timeEdgeIds: null,
      highlightNodes: new Set(), highlightEdges: new Set(), selected: new Set(), pinned: new Set(), favorites: new Set(),
      colorMode: "type", sizeMode: "evidence", labelMode: "all", avoidOverlap: false,
      dates: [], playTimer: null, boxMode: false, layoutSnapshot: null, clickTimer: null, lastClickNode: null,
      nodeObjects: new Map(), glowCache: new Map(), starField: null, overlapTick: 0
    };

    function escapeHtml(value) { return String(value ?? "").replace(/[&<>'"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[c])); }
    function idOf(v) { return typeof v === "object" && v ? String(v.id) : String(v); }
    function edgeKey(e) { return String(e.id || `${idOf(e.source)}→${idOf(e.target)}:${e.relation}`); }
    function hash(s) { let h=0; for (const c of String(s)) h=((h<<5)-h+c.charCodeAt(0))|0; return Math.abs(h); }
    function typeColor(type) { return TYPE_PALETTE[hash(type) % TYPE_PALETTE.length]; }
    function parseDate(value) {
      if (!value) return null; const s=String(value).trim().replace(/中国标准时间|北京时间|北京标准时间/g, "").trim();
      let m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})[ T](\d{1,2}):(\d{2}):(\d{2})\s*(UTC|GMT)?$/i);
      if (m) { const [,y,mo,d,h,mi,se,z]=m; return z ? new Date(Date.UTC(+y,+mo-1,+d,+h,+mi,+se)) : new Date(Date.UTC(+y,+mo-1,+d,+h-8,+mi,+se)); }
      const d=new Date(value); return Number.isNaN(d.getTime()) ? null : d;
    }
    function dateKey(value) { const d=value instanceof Date ? value : parseDate(value); if (!d) return ""; const p=new Intl.DateTimeFormat("zh-CN",{timeZone:"Asia/Shanghai",year:"numeric",month:"numeric",day:"numeric"}).formatToParts(d); const o={}; p.forEach(x=>o[x.type]=x.value); return `${o.year}.${o.month}.${o.day}`; }
    function normalizeDateInput(v) { const m=String(v||"").trim().replace(/年|月|[-/]/g,".").replace(/日/g,"").replace(/\.+/g,".").match(/^(\d{4})\.(\d{1,2})\.(\d{1,2})$/); if(!m)return ""; const d=new Date(Date.UTC(+m[1],+m[2]-1,+m[3])); if(d.getUTCFullYear()!=+m[1]||d.getUTCMonth()!=+m[2]-1||d.getUTCDate()!=+m[3])return ""; return `${+m[1]}.${+m[2]}.${+m[3]}`; }
    function keyToDate(k) { const m=String(k).match(/^(\d{4})\.(\d{1,2})\.(\d{1,2})$/); return m ? new Date(Date.UTC(+m[1],+m[2]-1,+m[3],16)) : null; }
    function isNew(item) { const d=parseDate(item.created_at); const diff=d ? Date.now()-d.getTime() : Infinity; return diff>=0 && diff<=NEW_MS; }
    function fmt(n,d=3) { const v=Number(n); return Number.isFinite(v) ? v.toFixed(d) : "—"; }
    function download(name, content, type="text/plain;charset=utf-8") { const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([content],{type})); a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000); }
    function showError(err) { $("loading").style.display="none"; $("error-panel").style.display="block"; $("error-message").textContent=err instanceof Error?err.message:String(err); console.error(err); }
    async function fetchJson(name) { let r; try { r=await fetch(`./${name}`,{cache:"no-store"}); } catch(e) { throw new Error(`无法请求 ${name}：${e.message}\n请通过 GitHub Pages 或 HTTP 服务器访问。`); } if(r.status===404) throw new Error(`找不到 ${name}，请确认它和 index.html 位于同一目录。`); if(!r.ok) throw new Error(`加载 ${name} 失败：HTTP ${r.status}`); const t=await r.text(); try{return JSON.parse(t);}catch(e){throw new Error(`${name} JSON 解析失败：${e.message}`);} }

    function validate(nodes,edges) {
      if(!Array.isArray(nodes)||!Array.isArray(edges)) throw new Error("nodes.json 与 edges.json 的根结构必须是数组。");
      const ids=new Set(); nodes.forEach((n,i)=>{ for(const f of ["id","name","type","created_at"]) if(!n[f]) throw new Error(`nodes.json 第 ${i+1} 项缺少 ${f}`); if(ids.has(n.id)) throw new Error(`重复节点 ID：${n.id}`); ids.add(n.id); });
      edges.forEach((e,i)=>{ for(const f of ["source","target","relation"]) if(!e[f]) throw new Error(`edges.json 第 ${i+1} 项缺少 ${f}`); if(!ids.has(e.source)||!ids.has(e.target)) throw new Error(`edges.json 第 ${i+1} 项引用不存在的节点`); });
    }

    function buildIndexes() {
      state.nodeMap=new Map(state.nodes.map(n=>[String(n.id),n])); state.edgeMap=new Map(); state.adjacency=new Map(state.nodes.map(n=>[String(n.id),[]]));
      state.edges.forEach(e=>{ state.edgeMap.set(edgeKey(e),e); state.adjacency.get(idOf(e.source))?.push({node:idOf(e.target),edge:e,direction:"out"}); state.adjacency.get(idOf(e.target))?.push({node:idOf(e.source),edge:e,direction:"in"}); });
      state.nodes.forEach(n=>{ n.__createdDate=parseDate(n.created_at); n.__updatedDate=parseDate(n.updated_at||n.created_at); n.__dateKey=dateKey(n.updated_at||n.created_at); n.__isNew=isNew(n); n.__search=buildSearchText(n); });
      state.edges.forEach(e=>{ e.__createdDate=parseDate(e.created_at); e.__updatedDate=parseDate(e.updated_at||e.created_at); e.__dateKey=dateKey(e.updated_at||e.created_at); e.__isNew=isNew(e); });
      state.favorites=new Set(JSON.parse(localStorage.getItem("kg-favorites")||"[]"));
    }
    function buildSearchText(n) {
      const parts=[n.name,n.type,n.category,n.layer,...(n.aliases||[]),...(n.search_terms||[])];
      for(const p of (n.publications||n.sources||[])) parts.push(p.title,p.journal,p.doi,p.evidence);
      try { if(window.pinyinPro?.pinyin) { const py=window.pinyinPro.pinyin(n.name,{toneType:"none",type:"array"}); parts.push(py.join(" "),py.join("")); } } catch(_) {}
      return parts.filter(Boolean).join(" ").toLowerCase();
    }

    function nodeRadius(n) {
      const m=n.metrics||{}; let v;
      if(state.sizeMode==="pagerank") v=(Number(m.pagerank)||0)*500;
      else if(state.sizeMode==="degree") v=Number(m.degree_count)||0;
      else if(state.sizeMode==="betweenness") v=(Number(m.betweenness_centrality)||0)*80;
      else v=Math.log2(1+Number(n.evidence_count||0))*2.2;
      return Math.max(3.7,Math.min(11,4+v*.65));
    }
    function nodeColor(n) { return state.colorMode==="community" ? (n.community_color||TYPE_PALETTE[(n.community_id||0)%TYPE_PALETTE.length]) : typeColor(n.type); }
    function glowTexture(color) {
      if(state.glowCache.has(color)) return state.glowCache.get(color); const c=document.createElement("canvas"); c.width=c.height=256; const x=c.getContext("2d"),g=x.createRadialGradient(128,128,0,128,128,128); g.addColorStop(0,"#fff"); g.addColorStop(.12,color); g.addColorStop(.4,color+"99"); g.addColorStop(.75,color+"22"); g.addColorStop(1,"transparent"); x.fillStyle=g; x.fillRect(0,0,256,256); const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace; state.glowCache.set(color,t); return t;
    }
    function createNodeObject(n) {
      const group=new THREE.Group(), r=nodeRadius(n), c=n.__isNew?"#F5FFE5":nodeColor(n), glow=n.__isNew?"#DFFF69":c;
      const core=new THREE.Mesh(new THREE.SphereGeometry(r,32,32),new THREE.MeshStandardMaterial({color:c,emissive:glow,emissiveIntensity:n.__isNew?4.2:2.5,roughness:.2,metalness:.16,transparent:true,opacity:.98})); group.add(core);
      const halo=new THREE.Mesh(new THREE.SphereGeometry(r*(n.__isNew?1.58:1.43),28,28),new THREE.MeshBasicMaterial({color:glow,transparent:true,opacity:n.__isNew?.28:.15,blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.BackSide})); group.add(halo);
      const sprite=new THREE.Sprite(new THREE.SpriteMaterial({map:glowTexture(glow),color:glow,transparent:true,opacity:n.__isNew?.9:.62,blending:THREE.AdditiveBlending,depthWrite:false})); sprite.scale.set(r*(n.__isNew?7:5.5),r*(n.__isNew?7:5.5),1); group.add(sprite);
      const label=new SpriteText(`${n.name}${n.__isNew?"  ✨新":""}`); label.color=n.__isNew?"#F3FFA5":"#F2FCFF"; label.textHeight=Math.max(2.9,Math.min(5,r*.67)); label.backgroundColor=n.__isNew?"rgba(20,28,2,.9)":"rgba(0,3,12,.88)"; label.padding=2.5; label.borderRadius=4; label.strokeWidth=.8; label.strokeColor="#000"; label.position.set(0,-(r*1.85+2.5),0); label.material.depthTest=false; label.material.depthWrite=false; label.renderOrder=9999; group.add(label);
      const ring=new THREE.Mesh(new THREE.TorusGeometry(r*1.75,.24,12,48),new THREE.MeshBasicMaterial({color:"#fff27a",transparent:true,opacity:.9,depthWrite:false})); ring.rotation.x=Math.PI/2; ring.visible=false; group.add(ring);
      group.userData={nodeId:String(n.id),core,halo,sprite,label,ring,phase:Math.random()*Math.PI*2,baseR:r,targetOpacity:1,currentOpacity:1}; state.nodeObjects.set(String(n.id),group); return group;
    }
    function createStars() { const count=3000,p=new Float32Array(count*3),c=new Float32Array(count*3); for(let i=0;i<count;i++){const r=500+Math.random()*1800,t=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1); p[i*3]=r*Math.sin(ph)*Math.cos(t);p[i*3+1]=r*Math.sin(ph)*Math.sin(t);p[i*3+2]=r*Math.cos(ph);const b=.45+Math.random()*.55;c[i*3]=b;c[i*3+1]=b*(.8+Math.random()*.2);c[i*3+2]=b;} const g=new THREE.BufferGeometry();g.setAttribute("position",new THREE.BufferAttribute(p,3));g.setAttribute("color",new THREE.BufferAttribute(c,3));return new THREE.Points(g,new THREE.PointsMaterial({size:1.6,vertexColors:true,transparent:true,opacity:.8,blending:THREE.AdditiveBlending,depthWrite:false})); }

    function nodeVisible(n) { return !state.hiddenTypes.has(n.type) && (!state.searchIds||state.searchIds.has(String(n.id))) && (!state.timeNodeIds||state.timeNodeIds.has(String(n.id))); }
    function linkVisible(e) { return nodeVisible(state.nodeMap.get(idOf(e.source))) && nodeVisible(state.nodeMap.get(idOf(e.target))) && (!state.timeEdgeIds||state.timeEdgeIds.has(edgeKey(e))); }
    function relationColor(e) { if(e.conflict) return "#FF82D3"; if(e.__isNew) return "#FFD85D"; const r=String(e.relation); if(r.includes("抑制"))return "#FF557E"; if(r.includes("促进"))return "#69EFFF"; if(r.includes("归经"))return "#C994FF"; return "#89A7FF"; }
    function linkColor(e) { return state.highlightEdges.size && !state.highlightEdges.has(edgeKey(e)) ? "#26354B" : relationColor(e); }
    function linkWidth(e) { const base=.55+Math.max(.35,Number(e.confidence||.5))*1.5+Math.log2(1+Number(e.evidence_count||0))*.35; return state.highlightEdges.has(edgeKey(e))?base*2.2:base; }
    function particleCount(e) { if(state.highlightEdges.size&&!state.highlightEdges.has(edgeKey(e)))return 0; return Math.min(12,2+Number(e.evidence_count||1)*2+(e.__isNew?2:0)); }
    function refresh() { if(!state.graph)return; state.graph.nodeVisibility(nodeVisible).linkVisibility(linkVisible).linkColor(linkColor).linkWidth(linkWidth).linkDirectionalParticles(particleCount).linkDirectionalParticleColor(relationColor); if(state.graph.refresh) state.graph.refresh(); updateObjectStates(); }
    function updateObjectStates() {
      for(const n of state.nodes){const o=state.nodeObjects.get(String(n.id));if(!o)continue; const highlighted=!state.highlightNodes.size||state.highlightNodes.has(String(n.id)); o.userData.targetOpacity=highlighted?1:.12; o.userData.ring.visible=state.selected.has(String(n.id))||state.pinned.has(String(n.id))||state.favorites.has(String(n.id)); o.userData.ring.material.color.set(state.selected.has(String(n.id))?"#71F3FF":state.pinned.has(String(n.id))?"#FFF17A":"#FF8ED8");}
    }

    function fitNodes(nodes,duration=900) { const valid=nodes.filter(n=>Number.isFinite(n.x)&&Number.isFinite(n.y)&&Number.isFinite(n.z)); if(!valid.length)return; const center=valid.reduce((a,n)=>(a.x+=n.x,a.y+=n.y,a.z+=n.z,a),{x:0,y:0,z:0}); center.x/=valid.length;center.y/=valid.length;center.z/=valid.length;let radius=18;valid.forEach(n=>radius=Math.max(radius,Math.hypot(n.x-center.x,n.y-center.y,n.z-center.z)));const cam=state.graph.camera(),dir=cam.position.clone().sub(new THREE.Vector3(center.x,center.y,center.z)).normalize();if(!Number.isFinite(dir.x))dir.set(.2,.1,1).normalize();const dist=Math.max(70,Math.min(900,radius/Math.tan(cam.fov*Math.PI/360)*1.35+40));state.graph.controls().autoRotate=false;state.graph.cameraPosition({x:center.x+dir.x*dist,y:center.y+dir.y*dist,z:center.z+dir.z*dist},center,duration);$("reset-view").classList.add("visible");}
    function bfs(root,depth) { const seen=new Set([root]),edges=new Set(),q=[[root,0]];while(q.length){const [id,d]=q.shift();if(d>=depth)continue;for(const a of state.adjacency.get(id)||[]){edges.add(edgeKey(a.edge));if(!seen.has(a.node)){seen.add(a.node);q.push([a.node,d+1]);}}}return{nodes:seen,edges}; }
    function exploreNode(id,depth) { if(!state.nodeMap.has(id))return; const r=bfs(id,depth);state.highlightNodes=r.nodes;state.highlightEdges=r.edges;refresh();fitNodes([...r.nodes].map(x=>state.nodeMap.get(x)));$("explore-status").textContent=`已高亮 ${r.nodes.size} 个节点、${r.edges.size} 条关系。`;$("explore-status").className="status ok"; }
    function clearHighlight(){state.highlightNodes.clear();state.highlightEdges.clear();refresh();$("path-output").textContent="";}
    function shortestPath(start,end,directed){const q=[start],prev=new Map([[start,null]]),prevEdge=new Map();while(q.length){const cur=q.shift();if(cur===end)break;for(const a of state.adjacency.get(cur)||[]){if(directed&&a.direction!=="out")continue;if(!prev.has(a.node)){prev.set(a.node,cur);prevEdge.set(a.node,a.edge);q.push(a.node);}}}if(!prev.has(end))return null;const ids=[],es=[];let c=end;while(c){ids.push(c);if(prevEdge.has(c))es.push(prevEdge.get(c));c=prev.get(c);}return{nodes:ids.reverse(),edges:es.reverse()};}

    function nodeByInput(value){const v=String(value||"").trim().toLowerCase();return state.nodes.find(n=>String(n.id).toLowerCase()===v||String(n.name).toLowerCase()===v||(n.aliases||[]).some(a=>String(a).toLowerCase()===v));}
    function doSearch(){const q=$("q").value.trim().toLowerCase().replace(/\s+/g,""),type=$("type-filter").value,nf=$("new-filter").value,min=$("min-evidence").value===""?0:Number($("min-evidence").value),max=$("max-evidence").value===""?Infinity:Number($("max-evidence").value),dk=normalizeDateInput($("date-filter").value);let matches=state.nodes.filter(n=>{let text=n.__search.replace(/\s+/g,"");return(!q||text.includes(q))&&(!type||n.type===type)&&(Number(n.evidence_count||0)>=min)&&(Number(n.evidence_count||0)<=max)&&(nf==="all"||(nf==="new"&&n.__isNew)||(nf==="old"&&!n.__isNew))&&(!$("date-filter").value.trim()||n.__dateKey===dk);}); if($("date-filter").value.trim()&&!dk){setStatus("search-status","日期格式错误，例如 2026.7.16","error");return;}state.searchIds=new Set(matches.map(n=>String(n.id)));renderResults(matches,$("search-results"));setStatus("search-status",`找到 ${matches.length} 个节点`,matches.length?"ok":"error");refresh();if(matches.length)fitNodes(matches);}
    function clearSearch(){state.searchIds=null;["q","min-evidence","max-evidence","date-filter"].forEach(id=>$(id).value="");$("type-filter").value="";$("new-filter").value="all";$("search-results").innerHTML="";setStatus("search-status","已清除搜索条件");refresh();}
    function renderResults(nodes,el){el.innerHTML="";nodes.slice(0,100).forEach(n=>{const b=document.createElement("button");b.className="result-item";b.innerHTML=`<span><span class="result-name">${escapeHtml(n.name)}${n.__isNew?" ✨新":""}</span><span class="result-sub">${escapeHtml(n.type)} · ${n.evidence_count||0} 篇 · ${escapeHtml(n.__dateKey)}</span></span><span class="badge">${escapeHtml(n.evidence_grade||"—")}</span>`;b.onclick=()=>handleNodeClick(n,{shiftKey:false});el.appendChild(b);});}
    function setStatus(id,msg,kind=""){const el=$(id);el.textContent=msg;el.className=`status ${kind}`;}

    function nodePublications(n){const arr=n.publications||n.sources||[];return arr.map(p=>({pmid:String(p.pmid||""),title:p.title||"题名暂未提供",authors:Array.isArray(p.authors)?p.authors.join(", "):(p.authors||""),journal:p.journal||"",year:p.year||String(p.publication_date||"").match(/\d{4}/)?.[0]||"",url:p.pubmed_url||(p.pmid?`https://pubmed.ncbi.nlm.nih.gov/${p.pmid}/`:`https://pubmed.ncbi.nlm.nih.gov/?term=${encodeURIComponent(n.name)}`),doi:p.doi||"",evidence:p.evidence||""}));}
    function openNode(n){const m=n.metrics||{},pubs=nodePublications(n);$("node-detail").innerHTML=`<div class="kicker">Research Entity ${n.__isNew?"· 48H NEW":""}</div><h2>${escapeHtml(n.name)}</h2><div class="actions"><button class="btn" id="favorite-node">${state.favorites.has(String(n.id))?"★ 已收藏":"☆ 收藏"}</button><button class="btn" id="pin-node">${state.pinned.has(String(n.id))?"解除固定":"固定节点"}</button><button class="btn" id="select-node">加入对比</button><a class="pub-link" target="_blank" rel="noopener" href="https://pubmed.ncbi.nlm.nih.gov/?term=${encodeURIComponent(n.name)}">PubMed 综合检索</a></div><div class="info-grid" style="margin-top:14px"><div class="info"><b>实体类型</b><span>${escapeHtml(n.type)}</span></div><div class="info"><b>分类</b><span>${escapeHtml(n.category||n.type)}</span></div><div class="info"><b>文献数量</b><span>${n.evidence_count||0}</span></div><div class="info"><b>更新日期</b><span>${escapeHtml(n.__dateKey)}</span></div><div class="info"><b>证据等级</b><span>${escapeHtml(n.evidence_grade||"—")}（数量代理）</span></div><div class="info"><b>社区星团</b><span>${escapeHtml(n.community_name||"—")}</span></div></div><section class="modal-section"><h3>中心性与关键节点指标</h3><table class="metrics-table"><tr><th>连接数</th><td>${m.degree_count??"—"}</td><th>Degree</th><td>${fmt(m.degree_centrality,4)}</td></tr><tr><th>PageRank</th><td>${fmt(m.pagerank,6)}</td><th>介数中心性</th><td>${fmt(m.betweenness_centrality,6)}</td></tr><tr><th>接近中心性</th><td>${fmt(m.closeness_centrality,6)}</td><th>冲突关系数</th><td>${n.conflict_count||0}</td></tr></table></section><section class="modal-section"><h3>关联 PubMed 文献（${pubs.length}）</h3><div class="pub-list">${pubs.length?pubs.map(pubCard).join(""):'<div class="hint">该节点尚未提供文献明细。</div>'}</div></section>`;
      $("favorite-node").onclick=()=>{const id=String(n.id);state.favorites.has(id)?state.favorites.delete(id):state.favorites.add(id);localStorage.setItem("kg-favorites",JSON.stringify([...state.favorites]));openNode(n);refresh();};
      $("pin-node").onclick=()=>{togglePin(n);openNode(n);}; $("select-node").onclick=()=>{state.selected.add(String(n.id));updateSelectionUI();refresh();}; $("node-overlay").classList.add("visible");
    }
    function pubCard(p){return `<article class="pub-card"><div class="pub-title">${escapeHtml(p.title)}</div><div class="pub-meta"><b>作者：</b>${escapeHtml(p.authors||"暂无作者数据")}<br><b>期刊：</b>${escapeHtml(p.journal||"暂未提供")}　<b>年份：</b>${escapeHtml(p.year||"未知")}<br><b>PMID：</b>${escapeHtml(p.pmid||"未提供")}${p.doi?`　<b>DOI：</b>${escapeHtml(p.doi)}`:""}</div><div class="pub-links"><a class="pub-link" target="_blank" rel="noopener" href="${escapeHtml(p.url)}">打开 PubMed</a></div>${p.evidence?`<div class="evidence-quote">${escapeHtml(p.evidence)}</div>`:""}</article>`;}

    function versionCompare(){const a=keyToDate(normalizeDateInput($("compare-a").value)),b=keyToDate(normalizeDateInput($("compare-b").value));if(!a||!b||a>=b){$("version-output").textContent="请输入两个有效日期，且较早日期必须小于较晚日期。";return;}const addedN=state.nodes.filter(n=>!snapshotAt(n,a)&&snapshotAt(n,b)),deletedN=state.nodes.filter(n=>snapshotAt(n,a)&&!snapshotAt(n,b)),addedE=state.edges.filter(e=>!snapshotAt(e,a)&&snapshotAt(e,b)),deletedE=state.edges.filter(e=>snapshotAt(e,a)&&!snapshotAt(e,b));let changes=state.nodes.map(n=>({n,d:evidenceAt(n,b)-evidenceAt(n,a)})).filter(x=>x.d!==0).sort((x,y)=>Math.abs(y.d)-Math.abs(x.d));const evA=state.nodes.reduce((s,n)=>s+evidenceAt(n,a),0),evB=state.nodes.reduce((s,n)=>s+evidenceAt(n,b),0);$("version-output").textContent=`新增节点：${addedN.length}\n删除节点：${deletedN.length}\n新增关系：${addedE.length}\n删除关系：${deletedE.length}\n节点证据总数变化：${evA} → ${evB}（${evB-evA>=0?"+":""}${evB-evA}）\n变化最大的实体：${changes.slice(0,5).map(x=>`${x.n.name} ${x.d>=0?"+":""}${x.d}`).join("；")||"无"}\n\n说明：删除统计依赖 deleted_at；证据变化依赖 history。增强数据中的 inferred=true 历史记录属于基于 created_at/updated_at 的推断。`;}

      $("color-mode").onchange=e=>{state.colorMode=e.target.value;state.nodeObjects.clear();rebuildNodeObjects();};$("size-mode").onchange=e=>{state.sizeMode=e.target.value;state.nodeObjects.clear();rebuildNodeObjects();};$("label-mode").onchange=e=>state.labelMode=e.target.value;$("avoid-overlap").onchange=e=>state.avoidOverlap=e.target.checked;
      document.querySelectorAll("[data-export]").forEach(b=>b.onclick=()=>exportData(b.dataset.export));$("reset-view").onclick=()=>{clearHighlight();const ns=state.nodes.filter(nodeVisible);fitNodes(ns,1000);$("reset-view").classList.remove("visible");};
      document.querySelectorAll("[data-close]").forEach(b=>b.onclick=()=>$(b.dataset.close).classList.remove("visible"));document.querySelectorAll(".overlay").forEach(o=>o.onclick=e=>{if(e.target===o)o.classList.remove("visible");});document.onkeydown=e=>{if(e.key==="Escape")document.querySelectorAll(".overlay.visible").forEach(o=>o.classList.remove("visible"));};
    }

    function initGraph(){
      state.graph=ForceGraph3D({rendererConfig:{antialias:true,alpha:true,preserveDrawingBuffer:true}})($("graph"))
        .width(innerWidth).height(innerHeight).backgroundColor("#010208").showNavInfo(false).graphData({nodes:state.nodes,links:state.edges}).nodeId("id")
        .nodeThreeObject(createNodeObject).nodeThreeObjectExtend(false).nodeLabel(()=>"").nodeVisibility(nodeVisible)
        .linkSource("source").linkTarget("target").linkVisibility(linkVisible).linkColor(linkColor).linkWidth(linkWidth).linkOpacity(.75)
        .linkDirectionalArrowLength(3.2).linkDirectionalArrowRelPos(.86).linkDirectionalArrowColor(relationColor)
        .linkDirectionalParticles(particleCount).linkDirectionalParticleWidth(e=>Math.min(3,.9+Number(e.confidence||.5)*1.6)).linkDirectionalParticleSpeed(e=>e.__isNew?.009:.0045).linkDirectionalParticleColor(relationColor).linkDirectionalParticleResolution(14)
        .onNodeClick(handleNodeClick).onNodeDragEnd(n=>{if(state.pinned.has(String(n.id))){n.fx=n.x;n.fy=n.y;n.fz=n.z;}}).onLinkClick(e=>{state.highlightNodes=new Set([idOf(e.source),idOf(e.target)]);state.highlightEdges=new Set([edgeKey(e)]);refresh();fitNodes([state.nodeMap.get(idOf(e.source)),state.nodeMap.get(idOf(e.target))]);setTimeout(()=>openEdge(e),500);})
        .onNodeHover(n=>$("graph").style.cursor=n?"pointer":"default").onLinkHover(e=>$("graph").style.cursor=e?"pointer":"default").onBackgroundClick(()=>clearHighlight())
        .warmupTicks(80).cooldownTicks(180).d3AlphaDecay(.022).d3VelocityDecay(.3);
      state.graph.d3Force("charge")?.strength(-165);state.graph.d3Force("link")?.distance(58);
      const scene=state.graph.scene();state.starField=createStars();scene.add(state.starField);scene.add(new THREE.HemisphereLight("#b8f3ff","#10051e",1.45));const a=new THREE.PointLight("#48e8ff",2600,1300,1.8);a.position.set(230,180,260);scene.add(a);const b=new THREE.PointLight("#986aff",2200,1100,1.8);b.position.set(-250,-100,-180);scene.add(b);scene.fog=new THREE.FogExp2("#010208",.00038);
      const renderer=state.graph.renderer();renderer.setPixelRatio(Math.min(devicePixelRatio||1,2));renderer.outputColorSpace=THREE.SRGBColorSpace;renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.25;
      const controls=state.graph.controls();controls.enableDamping=true;controls.dampingFactor=.07;controls.autoRotate=true;controls.autoRotateSpeed=.13;controls.minDistance=30;controls.maxDistance=1600;controls.addEventListener("start",()=>controls.autoRotate=false);
      const z=Math.max(300,210+Math.sqrt(state.nodes.length)*28);state.graph.cameraPosition({x:z*.12,y:z*.08,z},{x:0,y:0,z:0},0);setupBoxSelection();
    }

    async function main(){try{const [nodes,edges]=await Promise.all([fetchJson("nodes.json"),fetchJson("edges.json")]);validate(nodes,edges);state.nodes=nodes;state.edges=edges;buildIndexes();initGraph();
      const types=[...new Set(nodes.map(n=>n.type))].sort();types.forEach(t=>$("type-filter").append(new Option(t,t)));const dl=$("node-list");nodes.sort((a,b)=>a.name.localeCompare(b.name,"zh-CN")).forEach(n=>{const o=document.createElement("option");o.value=n.name;o.label=`${n.type} · ${n.id}`;dl.appendChild(o);});
      renderLegend();renderCollections();buildTimeline();setupUI();animate();$("loading").style.display="none";window.onresize=()=>state.graph.width(innerWidth).height(innerHeight);
    }catch(e){showError(e);}}
    main();
  })();
  </script>
</body>
</html>
