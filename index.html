        if (rawText.trim() === "") {
          throw new Error(`${filename} 内容为空。`);
        }

        try {
          return JSON.parse(rawText);
        } catch (error) {
          throw new Error(`${filename} JSON 解析失败：${error.message}`);
        }
      }

      function initializeGraph(nodes, edges) {
        if (
          typeof THREE === "undefined" ||
          typeof ForceGraph3D === "undefined" ||
          typeof SpriteText === "undefined"
        ) {
          throw new Error(
            "3D 依赖库加载失败，请检查网络连接或 CDN 是否可访问。"
          );
        }

        graphNodes = nodes;
        graphEdges = edges;

        graph = ForceGraph3D()(graphElement)
          .width(window.innerWidth)
          .height(window.innerHeight)
          .backgroundColor("#010208")
          .showNavInfo(false)
          .graphData({ nodes, links: edges })
          .nodeId("id")
          .nodeThreeObject(createNodeObject)
          .nodeThreeObjectExtend(false)
          .nodeLabel(() => "")
          .linkSource("source")
          .linkTarget("target")
          .linkColor(linkColorAccessor)
          .linkWidth(linkWidthAccessor)
          .linkOpacity(linkOpacityAccessor)
          .linkDirectionalArrowLength(3.7)
          .linkDirectionalArrowRelPos(0.87)
          .linkDirectionalArrowColor((link) => {
            const relation = String(link.relation);

            if (relation.includes("抑制")) {
              return "#FF4C81";
            }

            if (relation.includes("促进")) {
              return "#5CEBFF";
            }

            return "#B68BFF";
          })
          .linkDirectionalParticles(linkParticleCountAccessor)
          .linkDirectionalParticleWidth(linkParticleWidthAccessor)
          .linkDirectionalParticleSpeed((link) =>
            String(link.relation).includes("抑制") ? 0.006 : 0.0045
          )
          .linkDirectionalParticleColor(getBaseLinkColor)
          .linkDirectionalParticleResolution(16)
          .onNodeClick(handleNodeClick)
          .onLinkClick(handleLinkClick)
          .onBackgroundClick(resetCurrentView)
          .onNodeHover((node) => {
            graphElement.style.cursor = node ? "pointer" : "default";
          })
          .onLinkHover((link) => {
            graphElement.style.cursor = link ? "pointer" : "default";
          })
          .warmupTicks(100)
          .cooldownTicks(220)
          .d3AlphaDecay(0.021)
          .d3VelocityDecay(0.3);

        const chargeForce = graph.d3Force("charge");
        const linkForce = graph.d3Force("link");

        if (chargeForce) {
          chargeForce.strength(-170);
        }

        if (linkForce) {
          linkForce.distance(58);
        }

        const scene = graph.scene();
        scene.add(createStarField());
        scene.add(new THREE.HemisphereLight("#B8F3FF", "#11061F", 1.55));

        const cyanLight = new THREE.PointLight("#45E7FF", 2900, 1300, 1.8);
        cyanLight.position.set(240, 190, 280);
        scene.add(cyanLight);

        const violetLight = new THREE.PointLight("#936BFF", 2500, 1100, 1.8);
        violetLight.position.set(-260, -120, -190);
        scene.add(violetLight);

        const goldLight = new THREE.PointLight("#DFFF72", 1600, 900, 1.9);
        goldLight.position.set(30, 260, -220);
        scene.add(goldLight);

        scene.fog = new THREE.FogExp2("#010208", 0.0004);

        const renderer = graph.renderer();
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.3;

        const controls = graph.controls();
        controls.enableDamping = true;
        controls.dampingFactor = 0.07;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.18;
        controls.minDistance = 35;
        controls.maxDistance = 1500;
        controls.addEventListener("start", () => {
          controls.autoRotate = false;
        });

        const initialDistance = Math.max(
          290,
          210 + Math.sqrt(Math.max(nodes.length, 1)) * 27
        );

        graph.cameraPosition(
          {
            x: initialDistance * 0.14,
            y: initialDistance * 0.1,
            z: initialDistance
          },
          { x: 0, y: 0, z: 0 },
          0
        );

        renderRecentDates();
        dateSearchInput.disabled = false;
        dateSearchButton.disabled = false;
        loadingElement.style.display = "none";
        animateNodeGlow();

        window.setTimeout(saveOverviewCamera, 1800);
      }

      datePanelToggle.addEventListener("click", () => {
        const collapsed = !datePanel.classList.contains("collapsed");
        setDatePanelCollapsed(collapsed);

        if (!collapsed) {
          window.setTimeout(() => dateSearchInput.focus(), 220);
        }
      });

      dateSearchButton.addEventListener("click", performDateSearch);

      dateSearchInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          performDateSearch();
        }
      });

      clearDateFilterButton.addEventListener("click", clearDateFilter);
      closeModalButton.addEventListener("click", closeNodeModal);
      resetViewButton.addEventListener("click", resetCurrentView);

      modalOverlay.addEventListener("click", (event) => {
        if (event.target === modalOverlay) {
          closeNodeModal();
        }
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          if (modalOverlay.classList.contains("visible")) {
            closeNodeModal();
          } else if (!datePanel.classList.contains("collapsed")) {
            setDatePanelCollapsed(true);
          } else {
            resetCurrentView();
          }
        }
      });

      window.addEventListener("resize", () => {
        if (graph) {
          graph.width(window.innerWidth).height(window.innerHeight);
        }
      });

      window.addEventListener("beforeunload", () => {
        if (animationFrameId !== null) {
          cancelAnimationFrame(animationFrameId);
        }

        if (detailTimer !== null) {
          clearTimeout(detailTimer);
        }
      });

      initializeDatePanelState();

      Promise.all([
        fetchJson("nodes.json"),
        fetchJson("edges.json")
      ])
        .then(([nodes, edges]) => {
          const nodeIds = validateNodes(nodes);
          validateEdges(edges, nodeIds);
          initializeGraph(nodes, edges);
        })
        .catch(showError);
    })();
  </script>
