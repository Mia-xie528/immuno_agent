<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>免疫知识星云</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/3d-force-graph@1"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; overflow: hidden; background: #02050d; font-family: 'Inter', sans-serif; color: #fff; }
        #graph-container { width: 100vw; height: 100vh; }
        
        .ui-header { position: absolute; top: 24px; left: 28px; z-index: 10; pointer-events: none; display: flex; flex-direction: column; gap: 6px; }
        .main-title { font-size: 24px; font-weight: 700; letter-spacing: 1.2px; display: flex; align-items: center; gap: 6px; }
        .main-title .light { color: #ffffff; text-shadow: 0 0 20px rgba(255,255,255,0.1); }
        .main-title .accent { color: #00e5ff; }
        .subtitle { font-size: 13px; font-weight: 400; color: #56647a; letter-spacing: 1px; }
        
        .loading-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #46516b; font-size: 14px; letter-spacing: 2px; background: rgba(0,0,0,0.5); padding: 6px 16px; border-radius: 20px; }
        
        /* 弹窗卡片样式 */
        #node-detail { 
            display: none; 
            position: absolute; 
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            background: rgba(8, 14, 30, 0.85); 
            backdrop-filter: blur(24px); 
            border: 1px solid rgba(0, 229, 255, 0.2); 
            border-radius: 20px; 
            padding: 32px 40px; 
            min-width: 260px; 
            max-width: 400px; 
            box-shadow: 0 0 60px rgba(0, 229, 255, 0.08); 
            z-index: 20; 
            text-align: center;
            pointer-events: auto;
        }
        #node-detail .close-btn { 
            position: absolute; top: 12px; right: 16px; 
            background: transparent; border: none; color: #46516b; font-size: 18px; cursor: pointer; 
            transition: 0.2s;
        }
        #node-detail .close-btn:hover { color: #fff; }
        #node-detail h2 { margin: 0 0 8px 0; font-weight: 600; font-size: 20px; color: #fff; }
        #node-detail .type { display: inline-block; padding: 2px 10px; border-radius: 12px; background: rgba(0, 229, 255, 0.1); color: #00e5ff; font-size: 12px; border: 1px solid rgba(0, 229, 255, 0.1); }
        #node-detail .desc { margin-top: 12px; font-size: 13px; color: #8a98b6; }
        .pubmed-btn { 
            display: inline-flex; align-items: center; justify-content: center;
            margin-top: 16px; padding: 8px 20px; 
            background: #00e5ff; color: #02050d; border-radius: 24px; 
            text-decoration: none; font-weight: 600; font-size: 13px; transition: 0.25s;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.1);
        }
        .pubmed-btn:hover { background: #ffffff; box-shadow: 0 0 25px rgba(255, 255, 255, 0.2); transform: scale(1.02); }
    </style>
</head>
<body>
    <div class="ui-header">
        <div class="main-title"><span class="light">免疫</span><span class="accent">知识星云</span></div>
        <div class="subtitle">▸ PubMed 文献 AI 自动抽取 | 点击节点查看文献</div>
    </div>
    <div id="graph-container"></div>
    <div class="loading-text" id="loading-text">星云展开中，请稍候...</div>

    <div id="node-detail">
        <button class="close-btn" onclick="document.getElementById('node-detail').style.display='none'">✖</button>
        <h2 id="detail-name">节点名称</h2>
        <span class="type" id="detail-type-span">未知类型</span>
        <p class="desc" id="detail-evidence">关联文献：0 篇</p>
        <a href="#" target="_blank" id="detail-link" class="pubmed-btn">📄 查阅 PubMed 文献</a>
    </div>

    <script>
        document.getElementById('loading-text').style.display = 'block';

        Promise.all([
            fetch('nodes.json').then(res => res.json()),
            fetch('edges.json').then(res => res.json())
        ]).then(([nodes, edges]) => {
            document.getElementById('loading-text').style.display = 'none';
            
            // 格式化节点数据（确保包含证据数量用于弹窗显示）
            const formattedNodes = nodes.map(node => {
                return {
                    id: node.id || node.name,
                    name: node.name || node.id,
                    type: node.type || node.entity_type || "其他",
                    val: (node.evidence_count || 1) * 0.8 + 1,
                    evidence_count: node.evidence_count || 0,
                    // 节点色彩，保留赛博蓝紫渐变，关闭光晕时会有高级感
                    color: ['#00e5ff', '#818cf8', '#a78bfa', '#34d399', '#f472b6'][Math.floor(Math.random() * 5)]
                };
            });

            // 格式化连线
            const formattedEdges = edges.map(edge => {
                return {
                    source: edge.source || edge.source_id || edge.from,
                    target: edge.target || edge.target_id || edge.to
                };
            });

            // 初始化 3D 星云
            const Graph = ForceGraph3D()(document.getElementById('graph-container'))
                .graphData({ nodes: formattedNodes, links: formattedEdges })
                .nodeLabel(node => `${node.name}`)
                .nodeAutoColorBy('type')
                // 🎇 核心特效：粒子流动光效
                .linkDirectionalParticles(2)
                .linkDirectionalParticleSpeed(0.005)
                .linkWidth(1.2)
                .linkOpacity(0.6)
                .d3AlphaDecay(0.02)
                .d3VelocityDecay(0.3)
                .nodeRelSize(5)
                .enableAutoRotate(true)
                .autoRotateSpeed(0.6)
                .forceEngine('d3')
                .d3ReheatSimulation() // 强制物理引擎推开节点
                // 🖱️ 核心交互：点击节点弹出卡片并跳转 PubMed
                .onNodeClick(node => {
                    const detail = document.getElementById('node-detail');
                    document.getElementById('detail-name').innerText = node.name;
                    document.getElementById('detail-type-span').innerText = node.type;
                    document.getElementById('detail-evidence').innerText = `关联文献：${node.evidence_count || 0} 篇`;
                    // 自动构建基于节点名称的 PubMed 搜索链接
                    document.getElementById('detail-link').href = `https://pubmed.ncbi.nlm.nih.gov/?term=${encodeURIComponent(node.name)}`;
                    detail.style.display = 'block';
                });
        })
        .catch(err => {
            document.getElementById('loading-text').innerHTML = "数据加载失败，请确保 nodes.json 和 edges.json 已上传到仓库根目录。";
            console.error(err);
        });
    </script>
</body>
</html>
